<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudySprint</title>
  <style>
    body { font-family: Arial, sans-serif; margin:0; padding:0; background:#f4f4f9; color:#333; }
    header { background:#4a90e2; color:white; text-align:center; padding:20px; }
    header h1 { margin:0; }
    main { padding:20px; max-width:600px; margin:auto; }
    .task { background:white; padding:15px; margin-bottom:15px; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1); display:flex; justify-content:space-between; align-items:center; }
    .task-info { flex:1; }
    .task button { background:#4a90e2; color:white; border:none; padding:10px 15px; border-radius:5px; cursor:pointer; margin-left:10px; }
    .task button:hover { background:#357ABD; }
    #add-task-form { display:flex; margin-bottom:20px; gap:10px; }
    #add-task-form input[type="text"], #add-task-form input[type="number"] { flex:1; padding:10px; border-radius:5px; border:1px solid #ccc; }
    #progress { text-align:center; margin-top:20px; font-size:1.1em; }
    #timer { font-weight:bold; color:#e74c3c; }
  </style>
</head>
<body>

<header>
  <h1>StudySprint</h1>
  <p>Boost your focus. Track tasks. Sprint through your study sessions!</p>
</header>

<main>
  <form id="add-task-form">
    <input type="text" id="task-name" placeholder="Task name" required>
    <input type="number" id="task-time" placeholder="Minutes" required min="1">
    <button type="submit">Add Task</button>
  </form>

  <div id="tasks"></div>

  <div id="progress">Tasks completed: <span id="completed-count">0</span></div>
</main>

<script>
  const tasksContainer = document.getElementById('tasks');
  const addTaskForm = document.getElementById('add-task-form');
  const completedCountEl = document.getElementById('completed-count');

  let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
  let completedCount = parseInt(localStorage.getItem('completedCount')) || 0;
  let activeTimer = null;
  let activeIndex = null;
  let remainingTime = 0;

  completedCountEl.textContent = completedCount;

  function saveData() {
    localStorage.setItem('tasks', JSON.stringify(tasks));
    localStorage.setItem('completedCount', completedCount);
  }

  function renderTasks() {
    tasksContainer.innerHTML = '';
    tasks.forEach((task, index) => {
      const taskDiv = document.createElement('div');
      taskDiv.className = 'task';
      const taskInfo = document.createElement('div');
      taskInfo.className = 'task-info';
      
      if (activeTimer && index === activeIndex) {
        taskInfo.innerHTML = `<h3>${task.name}</h3><p>Time left: <span id="timer">${formatTime(remainingTime)}</span></p>`;
      } else {
        taskInfo.innerHTML = `<h3>${task.name}</h3><p>Time: ${task.time} min</p>`;
      }
      taskDiv.appendChild(taskInfo);

      const startBtn = document.createElement('button');
      startBtn.textContent = 'Start Sprint';
      startBtn.onclick = () => startSprint(index);
      taskDiv.appendChild(startBtn);

      tasksContainer.appendChild(taskDiv);
    });
  }

  addTaskForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const name = document.getElementById('task-name').value;
    const time = parseInt(document.getElementById('task-time').value);
    tasks.push({ name, time });
    saveData();
    addTaskForm.reset();
    renderTasks();
  });

  function startSprint(index) {
    if (activeTimer) return alert("Finish the current sprint first!");
    const task = tasks[index];
    remainingTime = task.time * 60;
    activeIndex = index;

    activeTimer = setInterval(() => {
      remainingTime--;
      const timerEl = document.getElementById('timer');
      if (timerEl) timerEl.textContent = formatTime(remainingTime);

      if (remainingTime <= 0) {
        clearInterval(activeTimer);
        activeTimer = null;
        alert(`Sprint for "${task.name}" completed!`);
        completedCount++;
        completedCountEl.textContent = completedCount;
        tasks.splice(index,1);
        activeIndex = null;
        saveData();
        renderTasks();
      }
    }, 1000);

    renderTasks();
  }

  function formatTime(seconds) {
    const m = Math.floor(seconds / 60);
    const s = seconds % 60;
    return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
  }

  renderTasks();
</script>

</body>
</html>
